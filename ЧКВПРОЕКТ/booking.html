<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JoyLand — Брондау</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      color:#fff;
      overflow-x:hidden;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.25), transparent 25%),
        radial-gradient(circle at right center, rgba(34,211,238,.16), transparent 25%),
        radial-gradient(circle at bottom left, rgba(16,185,129,.15), transparent 20%),
        radial-gradient(circle at bottom right, rgba(245,158,11,.14), transparent 18%),
        linear-gradient(180deg, #040816 0%, #020617 100%);
      position:relative;
    }

    .container{
      width:100%;
      max-width:1500px;
      margin:0 auto;
      padding:0 32px;
      position:relative;
      z-index:2;
    }

    #bg{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      opacity:.55;
      pointer-events:none;
    }

    .bg-blobs{
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:0;
      pointer-events:none;
    }

    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.28;
      animation:floatBlob 15s ease-in-out infinite;
    }

    .b1{
      width:340px;
      height:340px;
      left:-80px;
      top:120px;
      background:#7c5cff;
    }

    .b2{
      width:380px;
      height:380px;
      right:-100px;
      top:180px;
      background:#22d3ee;
      animation-delay:2s;
    }

    .b3{
      width:320px;
      height:320px;
      left:18%;
      bottom:-60px;
      background:#10b981;
      animation-delay:4s;
    }

    .b4{
      width:280px;
      height:280px;
      right:14%;
      bottom:-40px;
      background:#f59e0b;
      animation-delay:6s;
    }

    @keyframes floatBlob{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-30px) scale(1.08)}
    }

    .nav{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(14px);
      background:rgba(5,10,25,.48);
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .nav-inner{
      min-height:84px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:54px;
      height:54px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background:linear-gradient(135deg, rgba(124,92,255,.22), rgba(34,211,238,.18));
      box-shadow:0 0 28px rgba(124,92,255,.25);
      overflow:hidden;
      flex-shrink:0;
    }

    .brand-title{
      font-size:24px;
      font-weight:800;
      line-height:1.1;
    }

    .brand-sub{
      font-size:13px;
      color:#cbd5e1;
      margin-top:2px;
    }

    .menu{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .menu a{
      text-decoration:none;
      color:#dbeafe;
      padding:11px 16px;
      border-radius:12px;
      transition:.3s ease;
      font-weight:600;
    }

    .menu a:hover{
      background:rgba(255,255,255,.08);
      transform:translateY(-2px);
      color:#fff;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px 22px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      text-decoration:none;
      cursor:pointer;
      font-weight:700;
      transition:.35s ease;
      background:rgba(255,255,255,.06);
      color:#fff;
    }

    .btn:hover{
      transform:translateY(-3px);
      background:rgba(255,255,255,.1);
    }

    .btn-primary{
      background:linear-gradient(135deg,#7c5cff,#22d3ee);
      box-shadow:0 10px 30px rgba(34,211,238,.18);
      color:#fff;
    }

    .btn-primary:hover{
      box-shadow:0 18px 40px rgba(124,92,255,.28);
    }

    .w100{
      width:100%;
    }

    .profile{
      position:relative;
    }

    .profile-btn{
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      border-radius:14px;
      padding:10px 14px;
      cursor:pointer;
    }

    .avatar{
      width:28px;
      height:28px;
      border-radius:50%;
      background:linear-gradient(135deg,#7c5cff,#22d3ee);
      display:inline-block;
    }

    .hello{
      display:flex;
      flex-direction:column;
      line-height:1.05;
      text-align:left;
    }

    .hi{
      font-size:11px;
      color:#cbd5e1;
    }

    .chev{
      opacity:.8;
    }

    .profile-menu{
      position:absolute;
      top:calc(100% + 10px);
      right:0;
      min-width:220px;
      display:none;
      flex-direction:column;
      gap:8px;
      padding:10px;
      border-radius:16px;
      background:rgba(10,15,30,.92);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 15px 40px rgba(0,0,0,.3);
      backdrop-filter:blur(16px);
    }

    .profile-menu.show{
      display:flex;
    }

    .profile-menu a,
    .profile-menu button{
      width:100%;
      text-align:left;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:12px 14px;
      color:#fff;
      text-decoration:none;
      cursor:pointer;
      font-weight:600;
    }

    .profile-menu .danger{
      color:#fecaca;
    }

    main{
      position:relative;
      z-index:2;
    }

    #booking{
      padding:42px 0 80px;
      min-height:calc(100vh - 84px);
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .section-title h2{
      font-size:44px;
      font-weight:800;
      margin-bottom:8px;
    }

    .section-title p{
      color:#cbd5e1;
      font-size:17px;
    }

    .book-grid{
      display:grid;
      grid-template-columns:1.35fr .9fr;
      gap:26px;
      align-items:start;
    }

    .book-card{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
      box-shadow:0 20px 80px rgba(0,0,0,.28);
      padding:26px;
    }

    .book-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.06), transparent 35%, transparent 70%, rgba(34,211,238,.06));
      pointer-events:none;
    }

    .book-card > *{
      position:relative;
      z-index:1;
    }

    .book-card h3{
      font-size:31px;
      margin-bottom:10px;
      font-weight:800;
    }

    .tiny{
      color:#cbd5e1;
      font-size:14px;
    }

    form{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .row2,
    .row3{
      display:grid;
      gap:14px;
    }

    .row2{
      grid-template-columns:1fr 1fr;
    }

    .row3{
      grid-template-columns:1fr 1fr 1fr;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
      color:#e2e8f0;
    }

    input,
    select,
    textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:18px;
      padding:16px 18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:15px;
      transition:.3s ease;
    }

    input::placeholder,
    textarea::placeholder{
      color:#aebacf;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:rgba(34,211,238,.45);
      box-shadow:0 0 0 4px rgba(34,211,238,.12);
      background:rgba(255,255,255,.11);
    }

    select option{
      color:#111827;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .result{
      margin-top:4px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.25);
      color:#dcfce7;
      font-weight:600;
    }

    .booking-list{
      margin-top:14px;
      min-height:240px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .booking-item{
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .booking-item b{
      display:block;
      margin-bottom:6px;
      font-size:16px;
    }

    .booking-empty{
      padding:18px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.14);
      color:#cbd5e1;
    }

    footer{
      padding:30px 0 45px;
      border-top:1px solid rgba(255,255,255,.06);
      color:#94a3b8;
      position:relative;
      z-index:2;
    }

    .foot{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .foot-left{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .foot-brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:999;
      display:none;
      min-width:260px;
      max-width:360px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(10,15,30,.94);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      backdrop-filter:blur(16px);
      color:#fff;
      flex-direction:column;
      gap:6px;
    }

    .toast.show{
      display:flex;
    }

    @media(max-width:1100px){
      .book-grid{
        grid-template-columns:1fr;
      }
    }

    @media(max-width:760px){
      .container{
        padding:0 18px;
      }

      .nav-inner{
        flex-direction:column;
        align-items:flex-start;
        padding:14px 0;
      }

      .menu{
        width:100%;
      }

      .section-title h2{
        font-size:32px;
      }

      .book-card{
        padding:18px;
        border-radius:24px;
      }

      .row2,
      .row3{
        grid-template-columns:1fr;
      }

      .menu a{
        padding:10px 12px;
      }
    }
    /* ---- */
  :root{
    --bg-main:#040816;
    --bg-end:#020617;
    --text-main:#ffffff;
    --text-muted:#cbd5e1;
    --nav-bg:rgba(5,10,25,.48);
    --menu-text:#dbeafe;
    --menu-hover-text:#ffffff;
    --menu-hover-bg:rgba(255,255,255,.08);

    --card-bg:rgba(255,255,255,.06);
    --card-border:rgba(255,255,255,.08);
    --card-soft:rgba(255,255,255,.04);

    --input-bg:rgba(255,255,255,.08);
    --input-text:#ffffff;
    --input-border:rgba(255,255,255,.08);

    --section-muted:#94a3b8;
    --pill-text:#e2e8f0;

    --chat-bg:#0f172a;
    --chat-inner:#0b1020;
    --chat-input-bg:#111827;
    --bot-bg:#1e293b;
    --user-bg:#22d3ee;
    --user-text:#000000;

    --footer-text:#94a3b8;
  }

  body.light-mode{
    --bg-main:#f8fafc;
    --bg-end:#e2e8f0;
    --text-main:#0f172a;
    --text-muted:#475569;
    --nav-bg:rgba(255,255,255,.84);
    --menu-text:#0f172a;
    --menu-hover-text:#0f172a;
    --menu-hover-bg:rgba(15,23,42,.08);

    --card-bg:rgba(255,255,255,.88);
    --card-border:rgba(15,23,42,.08);
    --card-soft:rgba(15,23,42,.04);

    --input-bg:#ffffff;
    --input-text:#0f172a;
    --input-border:#cbd5e1;

    --section-muted:#475569;
    --pill-text:#0f172a;

    --chat-bg:#ffffff;
    --chat-inner:#f1f5f9;
    --chat-input-bg:#e2e8f0;
    --bot-bg:#e2e8f0;
    --user-bg:#22d3ee;
    --user-text:#0f172a;

    --footer-text:#475569;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
  }

  html{
    scroll-behavior:smooth;
  }

  body{
    min-height:100vh;
    color:var(--text-main);
    overflow-x:hidden;
    background:
      radial-gradient(circle at top left, rgba(124,92,255,.25), transparent 25%),
      radial-gradient(circle at right center, rgba(34,211,238,.16), transparent 25%),
      radial-gradient(circle at bottom left, rgba(16,185,129,.15), transparent 20%),
      radial-gradient(circle at bottom right, rgba(245,158,11,.14), transparent 18%),
      linear-gradient(180deg, var(--bg-main) 0%, var(--bg-end) 100%);
    transition:background .35s ease,color .35s ease;
  }

  .container{
    width:100%;
    max-width:100%;
    padding:0 48px;
    position:relative;
    z-index:2;
  }

  .bg-blobs{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }

  .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.35;
    animation:floatBlob 14s ease-in-out infinite;
  }

  .blob1{
    width:320px;
    height:320px;
    background:#7c5cff;
    top:80px;
    left:-80px;
  }

  .blob2{
    width:360px;
    height:360px;
    background:#22d3ee;
    top:220px;
    right:-100px;
    animation-delay:2s;
  }

  .blob3{
    width:300px;
    height:300px;
    background:#14b8a6;
    bottom:40px;
    left:20%;
    animation-delay:4s;
  }

  .blob4{
    width:260px;
    height:260px;
    background:#f59e0b;
    bottom:-40px;
    right:18%;
    animation-delay:6s;
  }

  @keyframes floatBlob{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-30px) scale(1.08); }
  }

  .particles{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    overflow:hidden;
  }

  .particle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.22);
    box-shadow:0 0 18px rgba(255,255,255,.18);
    animation:rise linear infinite;
  }

  .particle:nth-child(1){ width:8px;height:8px;left:8%;animation-duration:16s;animation-delay:0s;top:100%; }
  .particle:nth-child(2){ width:14px;height:14px;left:16%;animation-duration:20s;animation-delay:3s;top:100%; }
  .particle:nth-child(3){ width:10px;height:10px;left:25%;animation-duration:18s;animation-delay:1s;top:100%; }
  .particle:nth-child(4){ width:18px;height:18px;left:34%;animation-duration:22s;animation-delay:6s;top:100%; }
  .particle:nth-child(5){ width:12px;height:12px;left:48%;animation-duration:19s;animation-delay:2s;top:100%; }
  .particle:nth-child(6){ width:16px;height:16px;left:58%;animation-duration:24s;animation-delay:4s;top:100%; }
  .particle:nth-child(7){ width:9px;height:9px;left:67%;animation-duration:17s;animation-delay:7s;top:100%; }
  .particle:nth-child(8){ width:15px;height:15px;left:78%;animation-duration:23s;animation-delay:5s;top:100%; }
  .particle:nth-child(9){ width:11px;height:11px;left:87%;animation-duration:21s;animation-delay:1s;top:100%; }
  .particle:nth-child(10){ width:20px;height:20px;left:94%;animation-duration:26s;animation-delay:8s;top:100%; }

  @keyframes rise{
    0%{
      transform:translateY(0) scale(.8);
      opacity:0;
    }
    15%{
      opacity:.8;
    }
    100%{
      transform:translateY(-110vh) scale(1.15);
      opacity:0;
    }
  }

  .nav{
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(14px);
    background:var(--nav-bg);
    border-bottom:1px solid var(--card-border);
    transition:background .35s ease,border-color .35s ease;
  }

  .nav-inner{
    min-height:84px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
    animation:fadeUp .8s ease both;
  }

  .brand-logo{
    width:52px;
    height:52px;
    border-radius:16px;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,#7c5cff,#22d3ee);
    box-shadow:0 0 25px rgba(124,92,255,.45);
    font-size:24px;
  }

  .brand h2{
    font-size:22px;
    line-height:1;
    margin-bottom:3px;
    color:var(--text-main);
  }

  .brand p{
    font-size:13px;
    color:var(--text-muted);
  }

  .menu{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }

  .menu a{
    color:var(--menu-text);
    text-decoration:none;
    padding:11px 16px;
    border-radius:12px;
    transition:.3s ease;
    font-weight:500;
  }

  .menu a:hover{
    background:var(--menu-hover-bg);
    color:var(--menu-hover-text);
    transform:translateY(-2px);
  }

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:14px 22px;
    border-radius:14px;
    text-decoration:none;
    font-weight:700;
    transition:.35s ease;
    border:1px solid var(--card-border);
  }

  .btn-primary{
    background:linear-gradient(135deg,#7c5cff,#22d3ee);
    color:#fff;
    box-shadow:0 10px 30px rgba(34,211,238,.22);
  }

  .btn-primary:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 16px 40px rgba(124,92,255,.35);
  }

  .btn-secondary{
    background:var(--card-bg);
    color:var(--text-main);
    backdrop-filter:blur(12px);
  }

  .btn-secondary:hover{
    transform:translateY(-3px);
    background:var(--card-soft);
  }

  .hero{
    min-height:92vh;
    display:flex;
    align-items:center;
    padding:40px 0 70px;
  }

  .hero-grid{
    display:grid;
    grid-template-columns:1.35fr .95fr;
    gap:30px;
    width:100%;
  }

  .card{
    position:relative;
    overflow:hidden;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    backdrop-filter:blur(18px);
    border-radius:28px;
    box-shadow:0 12px 60px rgba(0,0,0,.25);
    transition:.35s ease, background .35s ease, border-color .35s ease;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,.07), transparent 35%, transparent 65%, rgba(34,211,238,.07));
    pointer-events:none;
  }

  .card:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 70px rgba(0,0,0,.34);
  }

  .hero-main{
    padding:56px;
    animation:fadeUp 1s ease .15s both;
  }

  .hero-main h1{
    font-size:64px;
    line-height:1.05;
    margin-bottom:22px;
    max-width:900px;
    color:var(--text-main);
  }

  .hero-main p{
    font-size:20px;
    color:var(--text-muted);
    max-width:850px;
    line-height:1.7;
    margin-bottom:28px;
  }

  .hero-actions{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:28px;
  }

  .pill-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
  }

  .pill{
    padding:12px 16px;
    border-radius:999px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    color:var(--pill-text);
    font-size:14px;
    animation:pulseGlow 3s ease-in-out infinite;
  }

  .hero-side{
    padding:34px;
    animation:fadeUp 1s ease .35s both;
  }

  .hero-side h3{
    font-size:28px;
    margin-bottom:20px;
    color:var(--text-main);
  }

  .offer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    padding:18px;
    border-radius:18px;
    margin-bottom:14px;
    background:var(--card-soft);
    border:1px solid var(--card-border);
    transition:.3s ease;
  }

  .offer:hover{
    transform:translateX(6px);
    background:var(--card-bg);
  }

  .offer strong{
    display:block;

  <div class="toast" id="toast">
    <b id="toastTitle"></b>
    <span id="toastText"></span>
  </div>

  <script>
  const API = "http://127.0.0.1:5000/api";

  // ===== canvas background =====
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const points = Array.from({ length: 70 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.45,
    vy: (Math.random() - 0.5) * 0.45,
    r: Math.random() * 2.2 + 1
  }));

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fill();

      for (let j = i + 1; j < points.length; j++) {
        const q = points[j];
        const dx = p.x - q.x;
        const dy = p.y - q.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = "rgba(255,255,255," + (0.08 - dist / 1800) + ")";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(animate);
  }

  animate();

  // ===== helpers =====
  const $ = (id) => document.getElementById(id);

  function showToast(title, text) {
    const toast = $("toast");
    const toastTitle = $("toastTitle");
    const toastText = $("toastText");

    if (!toast || !toastTitle || !toastText) return;

    toastTitle.textContent = title;
    toastText.textContent = text;
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 2600);
  }

  function showResult(text, ok = true) {
    const box = $("bookingResult");
    if (!box) return;

    box.style.display = "block";
    box.textContent = text;

    if (ok) {
      box.style.background = "rgba(34,197,94,.12)";
      box.style.border = "1px solid rgba(34,197,94,.25)";
      box.style.color = "#dcfce7";
    } else {
      box.style.background = "rgba(239,68,68,.12)";
      box.style.border = "1px solid rgba(239,68,68,.25)";
      box.style.color = "#fecaca";
    }
  }

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  // ===== profile / auth state =====
  async function loadCurrentUser() {
    const profileWrap = $("profileWrap");
    const profileName = $("profileName");
    const logoutBtn = $("logoutBtn");

    try {
      const res = await fetch(`${API}/me`, {
        method: "GET",
        credentials: "include"
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok && data.ok) {
        if (profileWrap) profileWrap.style.display = "block";
        if (profileName) profileName.textContent = data.user.username || "Пайдаланушы";
      } else {
        if (profileWrap) profileWrap.style.display = "none";
      }
    } catch (err) {
      if (profileWrap) profileWrap.style.display = "none";
    }

    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        try {
          await fetch(`${API}/logout`, {
            method: "POST",
            credentials: "include"
          });
        } catch (err) {
          console.error(err);
        }
        window.location.href = "index1.html";
      });
    }
  }

  const profileBtn = $("profileBtn");
  const profileMenu = $("profileMenu");

  if (profileBtn && profileMenu) {
    profileBtn.addEventListener("click", () => {
      profileMenu.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#profileWrap")) {
        profileMenu.classList.remove("show");
      }
    });
  }

  // ===== year =====
  const y = $("y");
  if (y) y.textContent = new Date().getFullYear();

  // ===== theme =====
  const themeToggle = $("themeToggle");
  const savedTheme = localStorage.getItem("joyland-theme");

  if (savedTheme === "light") {
    document.body.classList.add("light-mode");
    if (themeToggle) themeToggle.textContent = "🌙";
  } else {
    if (themeToggle) themeToggle.textContent = "☀️";
  }

  if (themeToggle) {
    themeToggle.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");

      if (document.body.classList.contains("light-mode")) {
        localStorage.setItem("joyland-theme", "light");
        themeToggle.textContent = "🌙";
      } else {
        localStorage.setItem("joyland-theme", "dark");
        themeToggle.textContent = "☀️";
      }
    });
  }

  // ===== chatbot =====
  const chatbotToggle = $("chatbotToggle");
  const chatbotBox = $("chatbotBox");
  const chatbotClose = $("chatbotClose");
  const chatbotInput = $("chatbotInput");
  const chatbotSend = $("chatbotSend");
  const chatbotMessages = $("chatbotMessages");

  function addChatMessage(text, type) {
    if (!chatbotMessages) return;
    const div = document.createElement("div");
    div.className = type === "user" ? "user-msg" : "bot-msg";
    div.textContent = text;
    chatbotMessages.appendChild(div);
    chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
  }

  async function sendChatMessage() {
    const text = chatbotInput?.value.trim();
    if (!text) return;

    addChatMessage(text, "user");
    chatbotInput.value = "";

    try {
      const res = await fetch(`${API}/chatbot`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, username: "guest" })
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        addChatMessage("Қате пайда болды.", "bot");
        return;
      }

      addChatMessage(data.answer, "bot");
    } catch (err) {
      console.error(err);
      addChatMessage("Серверге қосылу мүмкін болмады.", "bot");
    }
  }

  if (chatbotToggle && chatbotBox) {
    chatbotToggle.addEventListener("click", () => {
      chatbotBox.classList.toggle("show");
    });
  }

  if (chatbotClose && chatbotBox) {
    chatbotClose.addEventListener("click", () => {
      chatbotBox.classList.remove("show");
    });
  }

  if (chatbotSend) {
    chatbotSend.addEventListener("click", sendChatMessage);
  }

  if (chatbotInput) {
    chatbotInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendChatMessage();
      }
    });
  }

  // ===== booking list render =====
  function bookingToText(booking) {
    return [
      `Аты-жөні: ${booking.full_name}`,
      `Телефон: ${booking.phone}`,
      `Күні: ${booking.booking_date}`,
      `Уақыты: ${booking.booking_time}`,
      `Қонақ саны: ${booking.guests}`,
      `Пакет: ${booking.package_name}`,
      `Төлем түрі: ${booking.payment_type}`,
      `Ескерту: ${booking.note || "-"}`
    ].join("\n");
  }

  function renderBookings(bookings) {
    const bookingList = $("bookingList");
    if (!bookingList) return;

    if (!bookings || bookings.length === 0) {
      bookingList.innerHTML = `<div class="booking-empty">Әзірге бронь жоқ.</div>`;
      return;
    }

    bookingList.innerHTML = bookings.map((b) => `
      <div class="booking-item">
        <b>${escapeHtml(b.full_name)}</b>
        <div class="tiny">📞 ${escapeHtml(b.phone)}</div>
        <div class="tiny">📅 ${escapeHtml(b.booking_date)} | ⏰ ${escapeHtml(b.booking_time)}</div>
        <div class="tiny">👥 ${escapeHtml(String(b.guests))} қонақ</div>
        <div class="tiny">🎁 ${escapeHtml(b.package_name)}</div>
        <div class="tiny">💳 ${escapeHtml(b.payment_type)}</div>
        <div class="tiny">📝 ${escapeHtml(b.note || "-")}</div>
      </div>
    `).join("");
  }

  async function loadBookings() {
    const bookingList = $("bookingList");
    if (!bookingList) return;

    try {
      const res = await fetch(`${API}/bookings`, {
        method: "GET",
        credentials: "include"
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        bookingList.innerHTML = `<div class="booking-empty">Броньдарды жүктеу мүмкін болмады.</div>`;
        return;
      }

      renderBookings(data.bookings || []);
    } catch (err) {
      console.error(err);
      bookingList.innerHTML = `<div class="booking-empty">Серверге қосылу мүмкін болмады.</div>`;
    }
  }

  // ===== booking submit =====
  const bookingForm = $("bookingForm");
  const downloadBookingBtn = $("downloadBooking");
  let lastBookingText = "";

  if (bookingForm) {
    bookingForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        full_name: $("bName")?.value.trim(),
        phone: $("bPhone")?.value.trim(),
        booking_date: $("bDate")?.value,
        booking_time: $("bTime")?.value,
        guests: parseInt($("bGuests")?.value || "1", 10),
        package: $("bPackage")?.value,
        payment: $("bPay")?.value,
        note: $("bNote")?.value.trim()
      };

      if (!payload.full_name || !payload.phone || !payload.booking_date || !payload.booking_time) {
        showResult("Барлық міндетті өрістерді толтырыңыз", false);
        return;
      }

      try {
        const res = await fetch(`${API}/booking`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        const result = await res.json().catch(() => ({}));

        if (!res.ok || !result.ok) {
          showResult(result.message || "Бронь сақталмады", false);
          showToast("Қате", result.message || "Бронь сақталмады");
          return;
        }

        lastBookingText = [
          "JoyLand бронь ақпараты",
          "----------------------",
          `Аты-жөні: ${payload.full_name}`,
          `Телефон: ${payload.phone}`,
          `Күні: ${payload.booking_date}`,
          `Уақыты: ${payload.booking_time}`,
          `Қонақ саны: ${payload.guests}`,
          `Пакет: ${payload.package}`,
          `Төлем түрі: ${payload.payment}`,
          `Түсініктеме: ${payload.note || "-"}`
        ].join("\n");

        showResult(result.message || "Бронь сақталды", true);
        showToast("Сәтті", result.message || "Бронь сақталды");

        if (downloadBookingBtn) {
          downloadBookingBtn.style.display = "inline-flex";
        }

        bookingForm.reset();
        $("bGuests").value = 10;
        await loadBookings();

      } catch (err) {
        console.error(err);
        showResult("Серверге қосылу мүмкін болмады", false);
      }
    });
  }

  // ===== single download =====
  if (downloadBookingBtn) {
    downloadBookingBtn.addEventListener("click", () => {
      if (!lastBookingText) return;

      const blob = new Blob([lastBookingText], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "joyland_booking.txt";
      a.click();

      URL.revokeObjectURL(url);
    });
  }

  // ===== download all =====
  const downloadAllBtn = $("downloadAll");
  if (downloadAllBtn) {
    downloadAllBtn.addEventListener("click", async () => {
      try {
        const res = await fetch(`${API}/bookings`, {
          method: "GET",
          credentials: "include"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok || !data.bookings || data.bookings.length === 0) {
          showToast("Ақпарат", "Жүктейтін бронь жоқ");
          return;
        }

        const text = data.bookings.map((b, i) =>
          `Бронь #${i + 1}\n${bookingToText(b)}`
        ).join("\n\n----------------------\n\n");

        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "joyland_all_bookings.txt";
        a.click();

        URL.revokeObjectURL(url);
      } catch (err) {
        console.error(err);
        showToast("Қате", "Барлық броньды жүктеу мүмкін болмады");
      }
    });
  }

  // ===== clear button (ui only if no delete api) =====
  const clearBookingsBtn = $("clearBookings");
  if (clearBookingsBtn) {
    clearBookingsBtn.addEventListener("click", () => {
      showToast("Ескерту", "Өшіру API серверде әлі қосылмаған");
    });
  }

  // ===== init =====
  loadCurrentUser();
  loadBookings();
</script>
  <div class="chatbot-toggle" id="chatbotToggle">💬</div>
  <div class="theme-toggle-floating" id="themeToggle">☀️</div>

<div class="chatbot-box" id="chatbotBox">
  <div class="chatbot-header">
    <span>JoyLand Bot</span>
    <button id="chatbotClose" type="button">✖</button>
  </div>

  <div class="chatbot-messages" id="chatbotMessages">
    <div class="bot-msg">Сәлем! Мен JoyLand көмекшісімін 👋</div>
  </div>

  <div class="chatbot-input-row">
    <input type="text" id="chatbotInput" placeholder="Сұрағыңызды жазыңыз..." />
    <button id="chatbotSend" type="button">Жіберу</button>
  </div>
</div>

<script src="chatbot.js"></script>
<script src="darklight.js"></script>

  <script src="script.js"></script>

</body>
</html>
